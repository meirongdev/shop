name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      maven: ${{ steps.filter.outputs.maven }}
      docs_site: ${{ steps.filter.outputs.docs_site }}
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            maven:
              - 'pom.xml'
              - '**/pom.xml'
              - '**/*.java'
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.xml'
              - '**/*.yml'
              - '**/*.yaml'
              - '**/*.properties'
              - '.mvn/**'
              - 'mvnw'
              - 'mvnw.cmd'
              - 'scripts/**'
              - 'Makefile'
              - '.editorconfig'
              - '.githooks/**'
              - '.github/workflows/**'
            docs_site:
              - 'docs-site/**'
              - 'Makefile'
              - '.github/workflows/**'
            platform:
              - 'k8s/**'
              - 'kind/**'
              - 'docker/**'
              - 'scripts/**'
              - '.mirrord/**'
              - 'Tiltfile'
              - 'Makefile'
              - '.github/workflows/**'

  platform-validate:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.1'

      - name: Validate platform assets
        run: bash ./scripts/validate-platform-assets.sh

  maven-verify:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.maven == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven verify
        run: ./mvnw -B -ntp verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          retention-days: 7

  archetype-test:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.maven == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Install archetypes
        run: ./mvnw -pl shop-common,shop-contracts,shop-archetypes -am install -B -ntp
      
      - name: Run archetype tests
        run: ./mvnw -pl archetype-tests test -B -ntp
      
      - name: Upload archetype test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archetype-test-results
          path: '**/archetype-tests/target/surefire-reports/*.xml'
          retention-days: 7

  docs-site:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.docs_site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs-site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Build docs-site
        run: |
          npm ci
          npm run build
