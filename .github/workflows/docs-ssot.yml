name: "Docs SSOT check"

on:
  pull_request:
  push:

jobs:
  verify-docs-ssot:
    name: Verify docs are SSOT-consistent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run doc SSOT check
        run: bash tooling/scripts/verify-docs-ssot.sh
