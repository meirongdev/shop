spring:
  application:
    name: activity-service
  mvc:
    problemdetails:
      enabled: true
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${ACTIVITY_DB_URL:jdbc:mysql://mysql:3306/shop_activity?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${ACTIVITY_DB_USERNAME:shop}
    password: ${ACTIVITY_DB_PASSWORD:shop}
  data:
    redis:
      host: ${ACTIVITY_REDIS_HOST:redis}
      port: ${ACTIVITY_REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
server:
  port: 8080
  shutdown: graceful
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - x-user-id
        - x-order-id
      correlation-fields:
        - x-user-id
        - x-order-id
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://otel-collector:4318/v1/logs}
logging:
  structured:
    format:
      console: logstash
shop:
  profiling:
    enabled: ${PYROSCOPE_ENABLED:false}
    server-address: ${PYROSCOPE_SERVER_ADDRESS:http://pyroscope:4040}
  security:
    internal:
      enabled: true
      token: ${SHOP_INTERNAL_TOKEN:local-dev-internal-token-change-me}
      excluded-path-prefixes:
        - /actuator
        - /v3/api-docs
        - /swagger-ui
  activity:
    loyalty-service-url: ${LOYALTY_SERVICE_URL:http://loyalty-service:8080}
    anti-cheat:
      player-requests-per-window: ${ACTIVITY_ANTI_CHEAT_PLAYER_LIMIT:5}
      ip-requests-per-window: ${ACTIVITY_ANTI_CHEAT_IP_LIMIT:20}
      window-seconds: ${ACTIVITY_ANTI_CHEAT_WINDOW_SECONDS:10}
      device-fingerprint-ttl-hours: ${ACTIVITY_ANTI_CHEAT_DEVICE_TTL_HOURS:24}
      device-fingerprint-enabled: ${ACTIVITY_ANTI_CHEAT_DEVICE_ENABLED:true}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
    persist-authorization: true
  paths-to-exclude:
    - /actuator/**
    - /internal/**
