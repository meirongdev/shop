spring:
  application:
    name: buyer-portal
  mvc:
    problemdetails:
      enabled: true
  thymeleaf:
    cache: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    session:
      tracking-modes: cookie
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - x-user-id
        - x-order-id
      correlation-fields:
        - x-user-id
        - x-order-id
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://otel-collector:4318/v1/logs}
logging:
  structured:
    format:
      console: logstash
shop:
  profiling:
    enabled: ${PYROSCOPE_ENABLED:false}
    server-address: ${PYROSCOPE_SERVER_ADDRESS:http://pyroscope:4040}
  portal:
    auth-base-url: ${AUTH_BASE_URL:http://auth-server:8080}
    gateway-base-url: ${GATEWAY_BASE_URL:http://api-gateway:8080}
    apple-client-id: ${APPLE_OAUTH2_CLIENT_ID:placeholder-apple-client-id}
    apple-redirect-uri: ${BUYER_PORTAL_APPLE_REDIRECT_URI:http://localhost:8080/buyer/login}
    http-version: ${BUYER_PORTAL_HTTP_VERSION:HTTP_1_1}
    connect-timeout: ${BUYER_PORTAL_CONNECT_TIMEOUT:PT2S}
    read-timeout: ${BUYER_PORTAL_READ_TIMEOUT:PT5S}
