<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:48px 40px;width:100%;max-width:460px}
        h1{font-size:24px;color:#1a1a2e;margin-bottom:8px}
        .subtitle{color:#6b7280;font-size:14px;margin-bottom:32px}
        label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
        input[type=text]{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
        .btn{display:block;width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:24px}
        .btn:hover{background:#4338ca}
        .links{text-align:center;margin-top:16px;font-size:13px}
        .links a{color:#4f46e5;text-decoration:none}
    </style>
</head>
<body>
<div class="card">
    <h1>Track Your Order</h1>
    <p class="subtitle">Enter the tracking token you received after placing your order</p>
    <form th:action="@{/buyer/guest/track}" method="post" th:object="${trackForm}">
        <label for="token">Order Token</label>
        <input type="text" id="token" th:field="*{token}" placeholder="Paste your order token" required/>
        <button type="submit" class="btn">Track Order</button>
    </form>
    <div class="links">
        <a th:href="@{/buyer/login}">Sign in</a> &middot;
        <a th:href="@{/buyer/home}">Browse products</a>
    </div>
</div>
</body>
</html>
