<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e}
        .topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
        .topbar h1{font-size:18px;color:#1a1a2e}
        .nav-links{display:flex;gap:20px}.nav-links a{color:#374151;text-decoration:none;font-size:14px;font-weight:500;padding:4px 0;border-bottom:2px solid transparent}
        .nav-links a:hover{color:#3b82f6;border-bottom-color:#3b82f6}
        .cart-link{position:relative}.badge{position:absolute;top:-8px;right:-12px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px}
        .user-info{display:flex;align-items:center;gap:16px;font-size:14px;color:#6b7280}
        .user-info a{color:#3b82f6;text-decoration:none;font-weight:500}
        .container{max-width:1000px;margin:24px auto;padding:0 24px}
        .card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
        .card h2{font-size:16px;color:#374151;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th{text-align:left;font-weight:600;color:#6b7280;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:2px solid #e5e7eb}
        td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#374151}
        .status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
        .status-PAID{background:#dbeafe;color:#1d4ed8}
        .status-SHIPPED{background:#fef3c7;color:#b45309}
        .status-DELIVERED{background:#d1fae5;color:#065f46}
        .status-CANCELLED{background:#fee2e2;color:#991b1b}
        .status-REFUNDED{background:#f3e8ff;color:#7c3aed}
        .status-PENDING_PAYMENT{background:#f3f4f6;color:#6b7280}
        .btn-sm{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
        .btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
        .btn-outline{background:#fff;color:#3b82f6;border:1px solid #3b82f6;text-decoration:none;display:inline-block;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600}
        .btn-outline:hover{background:#eff6ff}
        .empty{text-align:center;padding:48px;color:#9ca3af}
        .notice{margin-bottom:16px;padding:12px 14px;border-radius:10px;background:#eff6ff;color:#1d4ed8;font-size:13px;line-height:1.5}
    </style>
</head>
<body>
<div th:replace="~{fragments/buyer-nav :: nav}"></div>
<div class="container">
    <div class="card">
        <h2>My Orders</h2>
        <div th:if="${infoMessage}" class="notice" th:text="${infoMessage}"></div>
        <div th:if="${orders.isEmpty()}" class="empty">No orders yet</div>
        <table th:if="${!orders.isEmpty()}">
            <thead><tr><th>Order</th><th>Seller</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td><a th:href="@{/buyer/order/{id}(id=${order.id()})}" style="color:#3b82f6;font-weight:600" th:text="${#strings.abbreviate(order.id().toString(), 12)}"></a></td>
                <td th:text="${order.sellerId()}"></td>
                <td th:text="${order.items().size()} + ' item(s)'"></td>
                <td style="font-weight:600" th:text="'$' + ${#numbers.formatDecimal(order.totalAmount(), 1, 2)}"></td>
                <td><span class="status" th:classappend="'status-' + ${order.status()}" th:text="${order.status()}"></span></td>
                <td>
                    <form th:if="${order.status() == 'PENDING_PAYMENT' or order.status() == 'PAID'}" method="post" th:action="@{/buyer/order/cancel}" style="display:inline">
                        <input type="hidden" name="orderId" th:value="${order.id()}"/>
                        <button type="submit" class="btn-sm btn-danger">Cancel</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
