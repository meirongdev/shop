<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${shop.shopName() ?: shop.displayName()} + ' - Shop Platform'">Seller Shop</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e}
        .topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
        .topbar h1{font-size:18px;color:#1a1a2e}
        .nav-links{display:flex;gap:20px}
        .nav-links a{color:#374151;text-decoration:none;font-size:14px;font-weight:500;padding:4px 0;border-bottom:2px solid transparent}
        .nav-links a:hover{color:#3b82f6;border-bottom-color:#3b82f6}
        .cart-link{position:relative}
        .badge{position:absolute;top:-8px;right:-12px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px}
        .user-info{display:flex;align-items:center;gap:16px;font-size:14px;color:#6b7280}
        .user-info a{color:#3b82f6;text-decoration:none;font-weight:500}
        .container{max-width:1200px;margin:0 auto;padding:0 24px}
        .shop-banner{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:40px 32px;margin-bottom:24px}
        .shop-banner h2{font-size:28px;margin-bottom:8px}
        .shop-banner .description{font-size:15px;opacity:.9;max-width:600px;margin-bottom:16px}
        .shop-stats{display:flex;gap:24px}
        .shop-stats .stat{font-size:14px}
        .shop-stats .stat .value{font-weight:700;font-size:18px}
        .shop-stats .stat .label{opacity:.8;font-size:12px}
        .rating{color:#fbbf24;font-size:16px}
        .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;padding-bottom:40px}
        .product-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;transition:transform .15s,box-shadow .15s}
        .product-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
        .product-card img{width:100%;height:180px;object-fit:cover;background:#f3f4f6}
        .product-card .info{padding:14px}
        .product-card .name{font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
        .product-card .price{color:#059669;font-weight:700;font-size:16px}
        .product-card .meta{font-size:12px;color:#9ca3af;margin-top:4px}
        .product-card a{display:block;text-decoration:none;color:inherit}
        .empty{text-align:center;color:#9ca3af;padding:60px 0;font-size:15px}
    </style>
</head>
<body>
<div th:replace="~{fragments/buyer-nav :: nav}"></div>
<div class="shop-banner">
    <div class="container">
        <h2 th:text="${shop.shopName() ?: shop.displayName()}">Shop Name</h2>
        <p class="description" th:if="${shop.shopDescription() != null}" th:text="${shop.shopDescription()}">Shop description</p>
        <div class="shop-stats">
            <div class="stat">
                <div class="value rating" th:text="${shop.avgRating() > 0} ? ${#numbers.formatDecimal(shop.avgRating(), 1, 1)} + ' ⭐' : 'New'">4.5 ⭐</div>
                <div class="label">Rating</div>
            </div>
            <div class="stat">
                <div class="value" th:text="${shop.totalSales()}">0</div>
                <div class="label">Sales</div>
            </div>
            <div class="stat">
                <div class="value" th:text="${shop.tier()}">SILVER</div>
                <div class="label">Tier</div>
            </div>
        </div>
    </div>
</div>
<div class="container">
    <div class="product-grid" th:if="${products != null and !products.hits().isEmpty()}">
        <div class="product-card" th:each="hit : ${products.hits()}">
            <a th:href="@{/buyer/product/{id}(id=${hit.id()})}">
                <img th:src="${hit.imageUrl() != null ? hit.imageUrl() : 'https://via.placeholder.com/300x200?text=Product'}" alt="Product"/>
                <div class="info">
                    <div class="name" th:text="${hit.name()}">Product Name</div>
                    <div class="price" th:text="'$' + ${hit.price()}">$0.00</div>
                    <div class="meta" th:text="'Stock: ' + ${hit.inventory()}">Stock: 0</div>
                </div>
            </a>
        </div>
    </div>
    <div class="empty" th:if="${products == null or products.hits().isEmpty()}">
        <p>This shop has no products yet.</p>
    </div>
</div>
</body>
</html>
