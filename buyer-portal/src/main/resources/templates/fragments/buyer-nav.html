<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="nav" class="topbar">
    <h1>Shop Platform <span style="color:#6b7280;font-weight:400;font-size:14px">/ Buyer</span></h1>
    <nav class="nav-links">
        <a th:href="@{/buyer/home}">Home</a>
        <a th:href="@{/buyer/cart}" class="cart-link">Cart<span th:if="${cartCount != null && cartCount > 0}" class="badge" th:text="${cartCount}"></span></a>
        <a th:href="@{/buyer/activities}">Activities</a>
        <a th:href="${sessionUser.guest} ? @{/buyer/login} : @{/buyer/welcome}">Welcome</a>
        <a th:href="${sessionUser.guest} ? @{/buyer/login} : @{/buyer/invite}">Invite</a>
        <a th:href="${sessionUser.guest} ? @{/buyer/login} : @{/buyer/loyalty}">Loyalty</a>
        <a th:href="${sessionUser.guest} ? @{/buyer/login} : @{/buyer/orders}">Orders</a>
        <a th:href="${sessionUser.guest} ? @{/buyer/login} : @{/buyer/wallet}">Wallet</a>
        <a th:href="${sessionUser.guest} ? @{/buyer/login} : @{/buyer/profile}">Profile</a>
    </nav>
    <div class="user-info">
        <span th:text="${sessionUser.guest ? 'Guest buyer' : sessionUser.displayName}"></span>
        <a th:if="${sessionUser.guest}" th:href="@{/buyer/login}">Sign in</a>
        <a th:unless="${sessionUser.guest}" th:href="@{/buyer/logout}">Logout</a>
    </div>
</div>
</body>
</html>
