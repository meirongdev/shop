      context: .
      dockerfile: docker/Dockerfile.module
      args:
        MODULE: buyer-bff
    environment:
      SHOP_INTERNAL_TOKEN: ${SHOP_INTERNAL_TOKEN:-local-dev-internal-token-change-me}
      PROFILE_SERVICE_URL: http://profile-service:8080
      PROMOTION_SERVICE_URL: http://promotion-service:8080
      WALLET_SERVICE_URL: http://wallet-service:8080
      MARKETPLACE_SERVICE_URL: http://marketplace-service:8080
      ORDER_SERVICE_URL: http://order-service:8080
      SEARCH_SERVICE_URL: http://search-service:8080
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-http://otel-collector:4318/v1/logs}
