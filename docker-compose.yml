services:

  # ─────────────────── Infrastructure ───────────────────

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${MYSQL_USER:-shop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shop}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "shop-kafka-cluster-id-0001"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey123}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    command: ["--config=/conf/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/conf/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v3.4.2
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--enable-feature=exemplar-storage"]
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────── Platform Services ───────────────────

  auth-server:
    image: shop/auth-server:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.module
      args:
        MODULE: auth-server
    environment:
      SHOP_AUTH_JWT_SECRET: ${SHOP_AUTH_JWT_SECRET:-change-this-to-a-32-byte-demo-secret}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-http://otel-collector:4318/v1/logs}
    ports:
      - "8090:8080"
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 30s

  api-gateway:
    image: shop/api-gateway:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.module
      args:
        MODULE: api-gateway
    environment:
      SHOP_AUTH_JWT_SECRET: ${SHOP_AUTH_JWT_SECRET:-change-this-to-a-32-byte-demo-secret}
      SHOP_INTERNAL_TOKEN: ${SHOP_INTERNAL_TOKEN:-local-dev-internal-token-change-me}
      AUTH_SERVER_URI: http://auth-server:8080
      BUYER_PORTAL_URI: http://buyer-portal:8080
      SELLER_PORTAL_URI: http://seller-portal:8080
      BUYER_BFF_URI: http://buyer-bff:8080
      SELLER_BFF_URI: http://seller-bff:8080
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-http://otel-collector:4318/v1/logs}
    ports:
      - "8080:8080"
    depends_on:
      auth-server:
        condition: service_healthy
      buyer-bff:
        condition: service_healthy
      seller-bff:
        condition: service_healthy
      buyer-portal:
        condition: service_healthy
      seller-portal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 30s

  buyer-bff:
