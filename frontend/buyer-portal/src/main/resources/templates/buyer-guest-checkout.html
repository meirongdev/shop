<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Checkout - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:48px 40px;width:100%;max-width:500px}
        .card h1{font-size:24px;color:#1a1a2e;margin-bottom:8px}
        .subtitle{color:#6b7280;font-size:14px;margin-bottom:24px}
        .product-info{background:#f9fafb;border-radius:8px;padding:16px;margin-bottom:24px}
        .product-info h3{font-size:16px;color:#1a1a2e;margin-bottom:4px}
        .product-info .price{color:#059669;font-weight:600;font-size:18px}
        label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;margin-top:16px}
        input[type=email],input[type=number]{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
        .btn{display:block;width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:24px}
        .btn:hover{background:#4338ca}
        .links{text-align:center;margin-top:16px;font-size:13px}
        .links a{color:#4f46e5;text-decoration:none}
    </style>
</head>
<body>
<div class="card">
    <h1>Guest Checkout</h1>
    <p class="subtitle">No account needed — just provide your email</p>
    <div class="product-info">
        <h3 th:text="${guestCheckoutForm.productName}">Product</h3>
        <span class="price" th:text="'$' + ${guestCheckoutForm.productPrice}">$0.00</span>
    </div>
    <form th:action="@{/buyer/guest/checkout}" method="post" th:object="${guestCheckoutForm}">
        <input type="hidden" th:field="*{productId}"/>
        <input type="hidden" th:field="*{productName}"/>
        <input type="hidden" th:field="*{productPrice}"/>
        <input type="hidden" th:field="*{sellerId}"/>
        <label for="guestEmail">Email Address</label>
        <input type="email" id="guestEmail" th:field="*{guestEmail}" placeholder="you@example.com" required/>
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" th:field="*{quantity}" min="1" max="10" value="1"/>
        <button type="submit" class="btn">Place Order</button>
    </form>
    <div class="links">
        <a th:href="@{/buyer/login}">Have an account? Sign in</a> &middot;
        <a th:href="@{/buyer/guest/track}">Track an order</a>
    </div>
</div>
</body>
</html>
