<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:48px 40px;width:100%;max-width:550px}
        h1{font-size:24px;color:#1a1a2e;margin-bottom:24px}
        .info{background:#f9fafb;border-radius:8px;padding:20px;margin-bottom:24px}
        .row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #e5e7eb}
        .row:last-child{border-bottom:none}
        .row .label{color:#6b7280}
        .row .value{color:#1a1a2e;font-weight:600}
        .items h3{font-size:16px;color:#1a1a2e;margin-bottom:12px}
        .item{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #f0f0f0}
        .item .name{color:#1a1a2e}
        .item .detail{color:#6b7280}
        .status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
        .status-PENDING_PAYMENT{background:#fef3c7;color:#92400e}
        .status-PAID,.status-PROCESSING{background:#dbeafe;color:#1e40af}
        .status-SHIPPED{background:#ede9fe;color:#5b21b6}
        .status-DELIVERED,.status-COMPLETED{background:#d1fae5;color:#065f46}
        .status-CANCELLED{background:#fee2e2;color:#991b1b}
        .links{text-align:center;margin-top:16px;font-size:13px}
        .links a{color:#4f46e5;text-decoration:none}
    </style>
</head>
<body>
<div class="card">
    <h1>Order Details</h1>
    <div class="info">
        <div class="row"><span class="label">Order No</span><span class="value" th:text="${order.orderNo()}">ORD-XXX</span></div>
        <div class="row"><span class="label">Status</span><span th:class="'status-badge status-' + ${order.status()}" th:text="${order.status()}">PENDING</span></div>
        <div class="row"><span class="label">Subtotal</span><span class="value" th:text="'$' + ${order.subtotal()}">$0.00</span></div>
        <div class="row"><span class="label">Discount</span><span class="value" th:text="'$' + ${order.discountAmount()}">$0.00</span></div>
        <div class="row"><span class="label">Total</span><span class="value" th:text="'$' + ${order.totalAmount()}">$0.00</span></div>
        <div class="row" th:if="${order.paidAt() != null}"><span class="label">Paid At</span><span class="value" th:text="${order.paidAt()}">-</span></div>
        <div class="row" th:if="${order.shippedAt() != null}"><span class="label">Shipped At</span><span class="value" th:text="${order.shippedAt()}">-</span></div>
        <div class="row" th:if="${order.deliveredAt() != null}"><span class="label">Delivered At</span><span class="value" th:text="${order.deliveredAt()}">-</span></div>
        <div class="row"><span class="label">Created</span><span class="value" th:text="${order.createdAt()}">-</span></div>
    </div>
    <div class="items" th:if="${order.items() != null and !order.items().isEmpty()}">
        <h3>Items</h3>
        <div class="item" th:each="item : ${order.items()}">
            <span class="name" th:text="${item.productName()}">Product</span>
            <span class="detail" th:text="${item.quantity()} + ' × $' + ${item.productPrice()}">1 × $0</span>
        </div>
    </div>
    <div class="links">
        <a th:href="@{/buyer/guest/track}">Track another order</a> &middot;
        <a th:href="@{/buyer/login}">Sign in</a>
    </div>
</div>
</body>
</html>
