---
# NetworkPolicy: restrict ingress to each service to only trusted callers.
# This replaces the static X-Internal-Token validation previously done by InternalAccessFilter.
# Port 8080 = application; port 8081 = management/actuator (open to observability namespace).

# api-gateway: public ingress (no restriction on port 8080)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-ingress
  namespace: shop
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8081

