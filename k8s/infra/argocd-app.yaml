apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shop-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/meirongdev/shop.git
    targetRevision: HEAD
    path: k8s/apps/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
