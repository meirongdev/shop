spring:
  application:
    name: loyalty-service
  mvc:
    problemdetails:
      enabled: true
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${LOYALTY_DB_URL:jdbc:mysql://mysql:3306/shop_loyalty?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${LOYALTY_DB_USERNAME:shop}
    password: ${LOYALTY_DB_PASSWORD:shop}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    repair-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
server:
  port: 8080
  shutdown: graceful
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - x-user-id
        - x-order-id
      correlation-fields:
        - x-user-id
        - x-order-id
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://otel-collector:4318/v1/logs}
logging:
  structured:
    format:
      console: logstash
shop:
  profiling:
    enabled: ${PYROSCOPE_ENABLED:false}
    server-address: ${PYROSCOPE_SERVER_ADDRESS:http://pyroscope:4040}
  loyalty:
    order-events-topic: ${ORDER_EVENTS_TOPIC:order.events.v1}
    buyer-registered-topic: ${BUYER_REGISTERED_TOPIC:buyer.registered.v1}
    profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8080}
    checkin-base-points: ${CHECKIN_BASE_POINTS:5}
    makeup-cost: ${CHECKIN_MAKEUP_COST:20}
    max-makeup-per-month: ${MAX_MAKEUP_PER_MONTH:3}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
    persist-authorization: true
  paths-to-exclude:
    - /actuator/**
    - /internal/**
