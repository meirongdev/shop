<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Order Cancelled</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h1 style="color: #333;">Order Cancelled ❌</h1>
    <p>Hi <span th:text="${username}">User</span>,</p>
    <p>Your order <strong th:text="${orderId}">ORD-001</strong> has been cancelled.</p>
    <div th:if="${reason != null}">
        <p>Reason: <span th:text="${reason}">N/A</span></p>
    </div>
    <p>If you have any questions, please contact our support team.</p>
    <hr style="border: 1px solid #eee;"/>
    <p style="color: #666; font-size: 12px;">This email was sent by Shop Platform.</p>
</body>
</html>
