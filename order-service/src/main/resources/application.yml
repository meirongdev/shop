spring:
  application:
    name: order-service
  mvc:
    problemdetails:
      enabled: true
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${ORDER_REDIS_HOST:redis}
      port: ${ORDER_REDIS_PORT:6379}
  datasource:
    url: ${ORDER_DB_URL:jdbc:mysql://mysql:3306/shop_order?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${ORDER_DB_USERNAME:shop}
    password: ${ORDER_DB_PASSWORD:shop}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    repair-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
server:
  port: 8080
  shutdown: graceful
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - x-user-id
        - x-order-id
      correlation-fields:
        - x-user-id
        - x-order-id
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://otel-collector:4318/v1/logs}
logging:
  structured:
    format:
      console: logstash
shop:
  profiling:
    enabled: ${PYROSCOPE_ENABLED:false}
    server-address: ${PYROSCOPE_SERVER_ADDRESS:http://pyroscope:4040}
  security:
    internal:
      enabled: true
      token: ${SHOP_INTERNAL_TOKEN:local-dev-internal-token-change-me}
      excluded-path-prefixes:
        - /actuator
        - /v3/api-docs
        - /swagger-ui
  order:
    outbox-publish-delay-ms: ${ORDER_OUTBOX_PUBLISH_DELAY_MS:5000}
    cancel-check-delay-ms: ${ORDER_CANCEL_CHECK_DELAY_MS:60000}
    auto-complete-delay-ms: ${ORDER_AUTO_COMPLETE_DELAY_MS:3600000}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
    persist-authorization: true
  paths-to-exclude:
    - /actuator/**
    - /internal/**
