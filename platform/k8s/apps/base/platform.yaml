apiVersion: v1
kind: Secret
metadata:
  name: shop-shared-secret
  namespace: shop
type: Opaque
stringData:
  SHOP_INTERNAL_TOKEN: local-dev-internal-token-change-me
  MYSQL_USER: shop
  MYSQL_PASSWORD: shop
  MEILI_MASTER_KEY: masterKey1234567890
  MEILISEARCH_ADMIN_KEY: masterKey1234567890
  MEILISEARCH_SEARCH_KEY: masterKey1234567890
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-shared-config
  namespace: shop
data:
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://otel-collector:4318/v1/logs
  PYROSCOPE_ENABLED: "true"
  PYROSCOPE_SERVER_ADDRESS: http://pyroscope.shop.svc.cluster.local:4040
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  MEILISEARCH_URL: http://meilisearch:7700
  MARKETPLACE_SERVICE_URL: http://marketplace-service:8080
  SEARCH_SERVICE_URL: http://search-service:8080
  MARKETPLACE_PRODUCT_TOPIC: marketplace.product.events.v1
  SHOP_SECURITY_INTERNAL_ENABLED: "false"
  SHOP_AUTH_JWKS_URI: http://auth-server:8080/.well-known/jwks.json
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=30"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
        tier: app
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.35
          command: ['sh', '-c', 'until echo "SELECT 1" | nc -w 2 mysql 3306 > /dev/null 2>&1; do echo "waiting for mysql"; sleep 3; done']
      containers:
        - name: auth-server
          image: shop/auth-server:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: AUTH_DB_HOST
              value: mysql
            - name: AUTH_DB_PORT
              value: "3306"
            - name: AUTH_DB_USER
              valueFrom:
                secretKeyRef:
                  name: shop-shared-secret
                  key: MYSQL_USER
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shop-shared-secret
                  key: MYSQL_PASSWORD
          envFrom:
            - secretRef:
                name: shop-shared-secret
            - configMapRef:
                name: shop-shared-config
          ports:
            - containerPort: 8080
            - containerPort: 8081
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
  namespace: shop
spec:
  selector:
    app: auth-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
