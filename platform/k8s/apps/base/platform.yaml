# ── NetworkPolicies (Cilium) ──────────────────────────────────────────────────
# ② api-gateway → all app Pods (port 8080 for Spring Boot; port 80 for nginx seller-portal / buyer-app)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway
  namespace: shop
spec:
  podSelector:
    matchExpressions:
      - key: tier
        operator: In
        values: [app]
      - key: app
        operator: NotIn
        values: [api-gateway]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8080
        - port: 80
  policyTypes: [Ingress]
---
# ③ buyer-bff → domain services (port 8080 only)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-buyer-bff
  namespace: shop
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [profile-service, marketplace-service, order-service,
                 wallet-service, search-service, promotion-service, loyalty-service]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: buyer-bff
      ports:
        - port: 8080
  policyTypes: [Ingress]
---
# ④ seller-bff → domain services (port 8080 only)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-seller-bff
  namespace: shop
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [marketplace-service, order-service, profile-service,
                 wallet-service, promotion-service, search-service]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: seller-bff
      ports:
        - port: 8080
  policyTypes: [Ingress]
---
# ⑤a buyer-portal → api-gateway (port 8080 only)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-buyer-portal-to-gateway
  namespace: shop
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  ingress:
