apiVersion: v1
kind: Secret
metadata:
  name: shop-shared-secret
  namespace: shop
type: Opaque
stringData:
  MYSQL_USER: shop
  MYSQL_PASSWORD: shop
  MEILI_MASTER_KEY: masterKey1234567890
  MEILISEARCH_ADMIN_KEY: masterKey1234567890
  MEILISEARCH_SEARCH_KEY: masterKey1234567890
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-auth
  namespace: shop
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: bootstrap
  MYSQL_USER: shop
  MYSQL_PASSWORD: shop
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: shop
data:
  01-create-databases.sql: |
    CREATE DATABASE IF NOT EXISTS shop_profile;
    CREATE DATABASE IF NOT EXISTS shop_promotion;
    CREATE DATABASE IF NOT EXISTS shop_wallet;
    CREATE DATABASE IF NOT EXISTS shop_marketplace;
    CREATE DATABASE IF NOT EXISTS shop_order;
    CREATE DATABASE IF NOT EXISTS shop_notification;
    CREATE DATABASE IF NOT EXISTS shop_loyalty;
    CREATE DATABASE IF NOT EXISTS shop_activity;
    CREATE DATABASE IF NOT EXISTS shop_webhook;
    CREATE DATABASE IF NOT EXISTS shop_subscription;
    CREATE DATABASE IF NOT EXISTS shop_auth;

    GRANT ALL PRIVILEGES ON shop_profile.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_promotion.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_wallet.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_marketplace.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_order.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_notification.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_loyalty.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_activity.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_webhook.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_subscription.* TO 'shop'@'%';
    GRANT ALL PRIVILEGES ON shop_auth.* TO 'shop'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: shop
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-auth
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD | grep -q 'mysqld is alive'
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD | grep -q 'mysqld is alive'
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root --password=$MYSQL_ROOT_PASSWORD | grep -q 'mysqld is alive'
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init-scripts
              mountPath: /docker-entrypoint-initdb.d/01-create-databases.sql
              subPath: 01-create-databases.sql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
        - name: mysql-init-scripts
          configMap:
            name: mysql-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: shop
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4
          ports:
            - containerPort: 6379
          startupProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shop
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "0"
            - name: KAFKA_PROCESS_ROLES
              value: controller,broker
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 0@kafka:9093
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: CLUSTER_ID
              value: shop-kafka-cluster-id-0001
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
            initialDelaySeconds: 30
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: shop
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
