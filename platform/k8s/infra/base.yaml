          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: shop
spec:
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shop
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules/*.yaml
    scrape_configs:
      - job_name: shop-apps
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - auth-server:8081
              - api-gateway:8081
              - buyer-bff:8081
              - seller-bff:8081
              - profile-service:8081
              - promotion-service:8081
              - wallet-service:8081
              - marketplace-service:8081
              - search-service:8081
              - order-service:8081
              - loyalty-service:8081
              - activity-service:8081
              - notification-service:8081
              - webhook-service:8081
              - subscription-service:8081
              - buyer-portal:8081
      - job_name: kafka-exporter
        static_configs:
          - targets:
              - kafka-exporter:9308
      - job_name: observability
        static_configs:
          - targets:
              - tempo:3200
              - loki:3100
              - grafana:3000
              - pyroscope:4040
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.4.2
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.enable-remote-write-receiver
            - --storage.tsdb.retention.time=7d
            - --enable-feature=exemplar-storage
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: alert-rules
              mountPath: /etc/prometheus/rules
          ports:
            - containerPort: 9090
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: alert-rules
          projected:
            sources:
              - configMap:
                  name: prometheus-alert-rules
              - configMap:
                  name: prometheus-slo-rules
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: shop
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
