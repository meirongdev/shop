apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-cloud-kubernetes-configuration-watcher
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-cloud-kubernetes-configuration-watcher
  template:
    metadata:
      labels:
        app: spring-cloud-kubernetes-configuration-watcher
    spec:
      serviceAccountName: spring-cloud-kubernetes-configuration-watcher
      containers:
        - name: watcher
          image: springcloud/spring-cloud-kubernetes-configuration-watcher:3.3.0
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_CLOUD_KUBERNETES_RELOAD_NAMESPACES_0
              value: shop
            - name: SPRING_CLOUD_KUBERNETES_CONFIG_INFORMER_ENABLED
              value: "true"
            - name: SPRING_CLOUD_KUBERNETES_CONFIGURATION_WATCHER_REFRESHDELAY
              value: "30000"
            - name: SPRING_CLOUD_KUBERNETES_CONFIGURATION_WATCHER_ACTUATORPORT
              value: "8081"
            - name: SPRING_CLOUD_KUBERNETES_CONFIGURATION_WATCHER_ACTUATORPATH
              value: /actuator
          ports:
            - containerPort: 8888
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            periodSeconds: 15
