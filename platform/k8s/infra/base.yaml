apiVersion: v1
kind: Service
metadata:
  name: spring-cloud-kubernetes-configuration-watcher
  namespace: shop
spec:
  selector:
    app: spring-cloud-kubernetes-configuration-watcher
  ports:
    - port: 8888
      targetPort: 8888
---
# Prometheus alert rules — P1 (critical) and P2 (warning) SLOs.
# Referenced by prometheus-config rule_files: /etc/prometheus/rules/*.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: shop
data:
  shop-alerts.yaml: |
    groups:
      - name: shop.p1.alerts
        rules:
          - alert: ServiceDown
            expr: up{job="shop-apps"} == 0
            for: 1m
            labels: {severity: critical, team: platform}
            annotations:
              summary: "{{ $labels.instance }} is DOWN"
              description: "Service unreachable for > 1 minute."
          - alert: HighHttpErrorRate
            expr: |
              sum by (instance) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
              / sum by (instance) (rate(http_server_requests_seconds_count[5m])) > 0.05
            for: 2m
            labels: {severity: critical, team: platform}
            annotations:
              summary: "High 5xx rate on {{ $labels.instance }}"
              description: "5xx error rate {{ $value | humanizePercentage }} > 5%."
      - name: shop.p2.alerts
        rules:
          - alert: SlowCheckout
            expr: |
              histogram_quantile(0.99,
                sum by (le) (
                  rate(shop_order_checkout_duration_seconds_bucket{result="success"}[5m])
                )
              ) > 5
            for: 5m
            labels: {severity: warning, team: backend}
            annotations:
              summary: "P99 checkout > 5s"
          - alert: KafkaConsumerLag
            expr: kafka_consumergroup_lag > 1000
            for: 5m
            labels: {severity: warning, team: backend}
            annotations:
              summary: "Kafka lag > 1000 ({{ $labels.consumergroup }})"
          - alert: KafkaConsumerLagCritical
            expr: kafka_consumergroup_lag > 10000
            for: 2m
            labels: {severity: critical, team: backend}
            annotations:
              summary: "Kafka lag CRITICAL > 10000 ({{ $labels.consumergroup }})"
          - alert: CircuitBreakerOpen
            expr: resilience4j_circuitbreaker_state{state="open"} == 1
            for: 5m
            labels: {severity: warning, team: backend}
            annotations:
              summary: "CircuitBreaker {{ $labels.name }} is OPEN"
          - alert: HighJvmHeapUsage
            expr: |
              sum by (instance) (jvm_memory_used_bytes{area="heap"})
              / sum by (instance) (jvm_memory_max_bytes{area="heap"}) > 0.85
            for: 5m
            labels: {severity: warning, team: platform}
            annotations:
              summary: "High JVM heap on {{ $labels.instance }}"
          - alert: OrderFailureRateHigh
            expr: |
              rate(shop_order_failed_total[5m])
              / (rate(shop_order_created_total[5m]) + rate(shop_order_failed_total[5m])) > 0.1
            for: 5m
            labels: {severity: warning, team: backend}
            annotations:
              summary: "Order failure rate > 10%"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-slo-rules
  namespace: shop
data:
  slo-rules.yaml: |
    groups:
      - name: shop.slo.recording
        interval: 30s
        rules:
          - record: shop:checkout_errors:ratio_rate5m
            expr: |
              sum(rate(http_server_requests_seconds_count{instance=~"buyer-bff:.*",method="POST",uri="/buyer/v1/checkout/create",status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{instance=~"buyer-bff:.*",method="POST",uri="/buyer/v1/checkout/create"}[5m]))

          - record: shop:checkout_errors:ratio_rate30m
            expr: |
              sum(rate(http_server_requests_seconds_count{instance=~"buyer-bff:.*",method="POST",uri="/buyer/v1/checkout/create",status=~"5.."}[30m]))
              /
              sum(rate(http_server_requests_seconds_count{instance=~"buyer-bff:.*",method="POST",uri="/buyer/v1/checkout/create"}[30m]))

          - record: shop:checkout_errors:ratio_rate1h
            expr: |
              sum(rate(http_server_requests_seconds_count{instance=~"buyer-bff:.*",method="POST",uri="/buyer/v1/checkout/create",status=~"5.."}[1h]))
              /
              sum(rate(http_server_requests_seconds_count{instance=~"buyer-bff:.*",method="POST",uri="/buyer/v1/checkout/create"}[1h]))

          - record: shop:checkout_errors:ratio_rate6h
            expr: |
              sum(rate(http_server_requests_seconds_count{instance=~"buyer-bff:.*",method="POST",uri="/buyer/v1/checkout/create",status=~"5.."}[6h]))
              /
              sum(rate(http_server_requests_seconds_count{instance=~"buyer-bff:.*",method="POST",uri="/buyer/v1/checkout/create"}[6h]))

      - name: shop.slo.alerts
        rules:
          - alert: CheckoutSLOFastBurn
            expr: |
              shop:checkout_errors:ratio_rate5m > (14.4 * 0.001)
              and
              shop:checkout_errors:ratio_rate30m > (14.4 * 0.001)
            for: 2m
            labels:
              severity: critical
              slo: checkout-availability
            annotations:
              summary: "Checkout SLO fast burn — error budget depleting rapidly"
              description: "5m checkout error rate {{ $value | humanizePercentage }} exceeds 14.4x budget (SLO 99.9%)"

          - alert: CheckoutSLOSlowBurn
            expr: |
              shop:checkout_errors:ratio_rate30m > (6 * 0.001)
              and
              shop:checkout_errors:ratio_rate6h > (6 * 0.001)
            for: 15m
            labels:
              severity: warning
              slo: checkout-availability
            annotations:
              summary: "Checkout SLO slow burn — error budget steadily depleting"
              description: "30m checkout error rate {{ $value | humanizePercentage }} exceeds 6x budget (SLO 99.9%)"
          - alert: PaymentFailureRateHigh
            expr: |
              rate(shop_payment_failed_total[5m])
              / (rate(shop_payment_success_total[5m]) + rate(shop_payment_failed_total[5m])) > 0.05
            for: 5m
            labels: {severity: warning, team: backend}
            annotations:
              summary: "Payment failure rate > 5%"
