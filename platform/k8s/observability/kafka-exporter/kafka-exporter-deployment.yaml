apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: shop
  labels:
    app: kafka-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.8.0
          args:
            - "--kafka.server=kafka.shop.svc.cluster.local:9092"
            - "--kafka.version=3.9.0"
            - "--topic.filter=.*"
            - "--group.filter=.*"
            - "--web.listen-address=:9308"
          ports:
            - containerPort: 9308
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /metrics
              port: 9308
            initialDelaySeconds: 10
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9308
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: shop
  labels:
    app: kafka-exporter
spec:
  selector:
    app: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: 9308
