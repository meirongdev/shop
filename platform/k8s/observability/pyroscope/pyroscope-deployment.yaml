apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.12.0
          args: ["server"]
          ports:
            - containerPort: 4040
          readinessProbe:
            httpGet:
              path: /health
              port: 4040
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 4040
            initialDelaySeconds: 10
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: shop
spec:
  selector:
    app: pyroscope
  ports:
    - port: 4040
      targetPort: 4040
