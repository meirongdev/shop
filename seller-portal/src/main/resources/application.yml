spring:
  application:
    name: seller-portal
  mvc:
    problemdetails:
      enabled: true
  thymeleaf:
    cache: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    session:
      tracking-modes: cookie
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
logging:
  structured:
    format:
      console: logstash
shop:
  portal:
    auth-base-url: ${AUTH_BASE_URL:http://auth-server:8080}
    gateway-base-url: ${GATEWAY_BASE_URL:http://api-gateway:8080}
