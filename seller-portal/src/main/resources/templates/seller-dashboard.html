<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e}
        .topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
        .topbar h1{font-size:18px;color:#1a1a2e}
        .nav-links{display:flex;gap:20px}.nav-links a{color:#374151;text-decoration:none;font-size:14px;font-weight:500;padding:4px 0;border-bottom:2px solid transparent}
        .nav-links a:hover{color:#f59e0b;border-bottom-color:#f59e0b}
        .user-info{display:flex;align-items:center;gap:16px;font-size:14px;color:#6b7280}
        .user-info a{color:#f59e0b;text-decoration:none;font-weight:500}
        .container{max-width:1100px;margin:24px auto;padding:0 24px}
        .stats{display:flex;gap:20px;margin-bottom:20px}
        .stat-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:24px;flex:1;text-align:center}
        .stat-card .number{font-size:36px;font-weight:700;color:#f59e0b}
        .stat-card .label{font-size:13px;color:#6b7280;margin-top:4px}
        .card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
        .card h2{font-size:16px;color:#374151;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th{text-align:left;font-weight:600;color:#6b7280;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:2px solid #e5e7eb}
        td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#374151}
        .status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
        .status-PAID{background:#dbeafe;color:#1d4ed8}.status-SHIPPED{background:#fef3c7;color:#b45309}
        .status-DELIVERED{background:#d1fae5;color:#065f46}.status-CANCELLED{background:#fee2e2;color:#991b1b}
        .btn-sm{padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
        .btn-outline{background:#fff;color:#f59e0b;border:1px solid #f59e0b}.btn-outline:hover{background:#fffbeb}
    </style>
</head>
<body>
<div th:replace="~{fragments/seller-nav :: nav}"></div>
<div class="container">
    <div class="stats">
        <div class="stat-card"><div class="number" th:text="${dashboard.productCount()}"></div><div class="label">Products</div></div>
        <div class="stat-card"><div class="number" th:text="${dashboard.activePromotionCount()}"></div><div class="label">Active Promotions</div></div>
        <div class="stat-card"><div class="number" th:text="${recentOrders.size()}"></div><div class="label">Recent Orders</div></div>
    </div>
    <div class="card">
        <h2>Recent Orders</h2>
        <table>
            <thead><tr><th>Order</th><th>Buyer</th><th>Total</th><th>Status</th><th></th></tr></thead>
            <tbody>
            <tr th:each="order : ${recentOrders}">
                <td><a th:href="@{/seller/order/{id}(id=${order.id()})}" style="color:#f59e0b;font-weight:600" th:text="${#strings.abbreviate(order.id().toString(), 12)}"></a></td>
                <td th:text="${order.buyerId()}"></td>
                <td style="font-weight:600" th:text="'$' + ${#numbers.formatDecimal(order.totalAmount(), 1, 2)}"></td>
                <td><span class="status" th:classappend="'status-' + ${order.status()}" th:text="${order.status()}"></span></td>
                <td><a th:href="@{/seller/order/{id}(id=${order.id()})}" class="btn-sm btn-outline">View</a></td>
            </tr>
            <tr th:if="${recentOrders.isEmpty()}"><td colspan="5" style="color:#9ca3af;text-align:center">No orders yet</td></tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
