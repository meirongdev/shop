<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .login-card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:48px 40px;width:100%;max-width:400px}
        .login-card h1{font-size:24px;color:#1a1a2e;margin-bottom:8px}
        .login-card .subtitle{color:#6b7280;font-size:14px;margin-bottom:32px}
        .badge{display:inline-block;background:#fef3c7;color:#b45309;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:16px}
        label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
        input[type=text],input[type=password]{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;transition:border-color .2s;outline:none}
        input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.15)}
        .field{margin-bottom:20px}
        button{width:100%;padding:12px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
        button:hover{background:#d97706}
    </style>
</head>
<body>
<div class="login-card">
    <span class="badge">SELLER</span>
    <h1>Shop Platform</h1>
    <p class="subtitle">Sign in to Seller Portal</p>
    <form method="post" th:action="@{/seller/login}" th:object="${loginForm}">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" th:field="*{username}" placeholder="seller.demo"/>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" th:field="*{password}" placeholder="Enter password"/>
        </div>
        <button type="submit">Sign In</button>
    </form>
</div>
</body>
</html>
