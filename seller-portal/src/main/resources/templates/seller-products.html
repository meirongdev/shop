<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e}
        .topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
        .topbar h1{font-size:18px;color:#1a1a2e}
        .nav-links{display:flex;gap:20px}.nav-links a{color:#374151;text-decoration:none;font-size:14px;font-weight:500;padding:4px 0;border-bottom:2px solid transparent}
        .nav-links a:hover{color:#f59e0b;border-bottom-color:#f59e0b}
        .user-info{display:flex;align-items:center;gap:16px;font-size:14px;color:#6b7280}
        .user-info a{color:#f59e0b;text-decoration:none;font-weight:500}
        .container{max-width:1100px;margin:24px auto;padding:0 24px}
        .grid{display:grid;grid-template-columns:1fr 2fr;gap:20px}
        .card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
        .card h2{font-size:16px;color:#374151;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
        label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px}
        input[type=text],input[type=number]{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;outline:none}
        input:focus{border-color:#f59e0b}
        .field{margin-bottom:14px}
        .inline-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .checkbox-field{display:flex;align-items:center;gap:8px;margin-bottom:14px}
        .checkbox-field input{width:auto}.checkbox-field label{margin-bottom:0}
        button{padding:10px 24px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;background:#f59e0b;color:#fff}
        button:hover{background:#d97706}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th{text-align:left;font-weight:600;color:#6b7280;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:2px solid #e5e7eb}
        td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#374151}
        .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
        .tag-green{background:#d1fae5;color:#065f46}.tag-amber{background:#fef3c7;color:#b45309}
    </style>
</head>
<body>
<div th:replace="~{fragments/seller-nav :: nav}"></div>
<div class="container">
    <div class="grid">
        <div class="card">
            <h2>Add Product</h2>
            <form method="post" th:action="@{/seller/product}" th:object="${productForm}">
                <div class="inline-fields">
                    <div class="field"><label>SKU</label><input type="text" th:field="*{sku}" placeholder="SKU-XXX-001"/></div>
                    <div class="field"><label>Name</label><input type="text" th:field="*{name}" placeholder="Product name"/></div>
                </div>
                <div class="field"><label>Description</label><input type="text" th:field="*{description}" placeholder="Short description"/></div>
                <div class="inline-fields">
                    <div class="field"><label>Price</label><input type="text" th:field="*{price}"/></div>
                    <div class="field"><label>Inventory</label><input type="text" th:field="*{inventory}"/></div>
                </div>
                <div class="checkbox-field"><input type="checkbox" th:field="*{published}"/><label>Published</label></div>
                <button type="submit">Create Product</button>
            </form>
        </div>
        <div class="card">
            <h2>Products</h2>
            <table>
                <thead><tr><th>SKU</th><th>Name</th><th>Price</th><th>Stock</th><th>Status</th></tr></thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td><code th:text="${product.sku()}"></code></td>
                    <td style="font-weight:600" th:text="${product.name()}"></td>
                    <td th:text="'$' + ${#numbers.formatDecimal(product.price(), 1, 2)}"></td>
                    <td th:text="${product.inventory()}"></td>
                    <td><span class="tag" th:classappend="${product.published()} ? 'tag-green' : 'tag-amber'" th:text="${product.published()} ? 'Published' : 'Draft'"></span></td>
                </tr>
                <tr th:if="${products.isEmpty()}"><td colspan="5" style="color:#9ca3af;text-align:center">No products yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
