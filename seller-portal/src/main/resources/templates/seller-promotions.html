<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotions - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e}
        .topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
        .topbar h1{font-size:18px;color:#1a1a2e}
        .nav-links{display:flex;gap:20px}.nav-links a{color:#374151;text-decoration:none;font-size:14px;font-weight:500;padding:4px 0;border-bottom:2px solid transparent}
        .nav-links a:hover{color:#f59e0b;border-bottom-color:#f59e0b}
        .user-info{display:flex;align-items:center;gap:16px;font-size:14px;color:#6b7280}
        .user-info a{color:#f59e0b;text-decoration:none;font-weight:500}
        .container{max-width:1100px;margin:24px auto;padding:0 24px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
        .card h2{font-size:16px;color:#374151;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
        label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px}
        input[type=text],input[type=number],select{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;outline:none}
        input:focus,select:focus{border-color:#f59e0b}
        .field{margin-bottom:14px}
        .inline-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        button{padding:10px 24px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;background:#f59e0b;color:#fff}
        button:hover{background:#d97706}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th{text-align:left;font-weight:600;color:#6b7280;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:2px solid #e5e7eb}
        td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#374151}
        .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
        .tag-amber{background:#fef3c7;color:#b45309}
        .tag-green{background:#d1fae5;color:#065f46}
        .full-width{grid-column:1/-1}
    </style>
</head>
<body>
<div th:replace="~{fragments/seller-nav :: nav}"></div>
<div class="container">
    <div class="grid">
        <div class="card">
            <h2>Create Offer</h2>
            <form method="post" th:action="@{/seller/promotion}" th:object="${promotionForm}">
                <div class="inline-fields">
                    <div class="field"><label>Code</label><input type="text" th:field="*{code}" placeholder="PROMO-CODE"/></div>
                    <div class="field"><label>Reward Amount</label><input type="text" th:field="*{rewardAmount}"/></div>
                </div>
                <div class="field"><label>Title</label><input type="text" th:field="*{title}" placeholder="Promotion title"/></div>
                <div class="field"><label>Description</label><input type="text" th:field="*{description}" placeholder="Promotion description"/></div>
                <button type="submit">Create Offer</button>
            </form>
        </div>
        <div class="card">
            <h2>Create Coupon</h2>
            <form method="post" th:action="@{/seller/coupon}" th:object="${couponForm}">
                <div class="inline-fields">
                    <div class="field"><label>Code</label><input type="text" th:field="*{code}" placeholder="SAVE20"/></div>
                    <div class="field"><label>Type</label>
                        <select th:field="*{discountType}">
                            <option value="FIXED_AMOUNT">Fixed Amount</option>
                            <option value="PERCENTAGE">Percentage</option>
                        </select>
                    </div>
                </div>
                <div class="inline-fields">
                    <div class="field"><label>Discount Value</label><input type="text" th:field="*{discountValue}"/></div>
                    <div class="field"><label>Min Order Amount</label><input type="text" th:field="*{minOrderAmount}"/></div>
                </div>
                <div class="inline-fields">
                    <div class="field"><label>Max Discount (optional)</label><input type="text" th:field="*{maxDiscount}"/></div>
                    <div class="field"><label>Usage Limit</label><input type="text" th:field="*{usageLimit}"/></div>
                </div>
                <button type="submit">Create Coupon</button>
            </form>
        </div>
        <div class="card full-width">
            <h2>Coupons</h2>
            <table>
                <thead><tr><th>Code</th><th>Type</th><th>Value</th><th>Min Order</th><th>Used/Limit</th><th>Status</th></tr></thead>
                <tbody>
                <tr th:each="coupon : ${coupons}">
                    <td><span class="tag tag-green" th:text="${coupon.code()}"></span></td>
                    <td th:text="${coupon.discountType()}"></td>
                    <td th:text="${coupon.discountType() == 'PERCENTAGE' ? coupon.discountValue() + '%' : '$' + #numbers.formatDecimal(coupon.discountValue(), 1, 2)}"></td>
                    <td th:text="'$' + ${#numbers.formatDecimal(coupon.minOrderAmount(), 1, 2)}"></td>
                    <td th:text="${coupon.usedCount()} + '/' + ${coupon.usageLimit()}"></td>
                    <td><span class="tag" th:classappend="${coupon.active()} ? 'tag-green' : 'tag-amber'" th:text="${coupon.active()} ? 'Active' : 'Inactive'"></span></td>
                </tr>
                <tr th:if="${coupons.isEmpty()}"><td colspan="6" style="color:#9ca3af;text-align:center">No coupons yet</td></tr>
                </tbody>
            </table>
        </div>
        <div class="card full-width">
            <h2>Offers</h2>
            <table>
                <thead><tr><th>Code</th><th>Title</th><th>Description</th><th>Reward</th></tr></thead>
                <tbody>
                <tr th:each="offer : ${promotions}">
                    <td><span class="tag tag-amber" th:text="${offer.code()}"></span></td>
                    <td style="font-weight:600" th:text="${offer.title()}"></td>
                    <td style="color:#6b7280" th:text="${offer.description()}"></td>
                    <td th:text="'$' + ${#numbers.formatDecimal(offer.rewardAmount(), 1, 2)}"></td>
                </tr>
                <tr th:if="${promotions.isEmpty()}"><td colspan="4" style="color:#9ca3af;text-align:center">No offers yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
