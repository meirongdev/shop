<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop - Shop Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e}
        .topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
        .topbar h1{font-size:18px;color:#1a1a2e}
        .nav-links{display:flex;gap:20px}.nav-links a{color:#374151;text-decoration:none;font-size:14px;font-weight:500;padding:4px 0;border-bottom:2px solid transparent}
        .nav-links a:hover{color:#f59e0b;border-bottom-color:#f59e0b}
        .user-info{display:flex;align-items:center;gap:16px;font-size:14px;color:#6b7280}
        .user-info a{color:#f59e0b;text-decoration:none;font-weight:500}
        .container{max-width:900px;margin:24px auto;padding:0 24px}
        .card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
        .card h2{font-size:16px;color:#374151;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
        .form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
        .form-group input:focus,.form-group textarea:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.1)}
        .form-group textarea{resize:vertical;min-height:80px}
        .form-group .hint{font-size:12px;color:#9ca3af;margin-top:4px}
        .btn{padding:10px 24px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
        .btn:hover{background:#d97706}
        .preview{background:#f9fafb;border-radius:10px;padding:24px;margin-bottom:24px}
        .preview h3{font-size:18px;margin-bottom:8px}
        .preview .description{color:#6b7280;font-size:14px;margin-bottom:12px}
        .preview .stats{display:flex;gap:24px}
        .preview .stats .stat .value{font-weight:700;font-size:20px;color:#f59e0b}
        .preview .stats .stat .label{font-size:12px;color:#9ca3af}
    </style>
</head>
<body>
<div th:replace="~{fragments/seller-nav :: nav}"></div>
<div class="container">
    <div class="card" th:if="${shop != null}">
        <h2>Shop Preview</h2>
        <div class="preview">
            <h3 th:text="${shop.shopName() ?: shop.displayName()}">My Shop</h3>
            <p class="description" th:if="${shop.shopDescription() != null}" th:text="${shop.shopDescription()}">Description</p>
            <div class="stats">
                <div class="stat">
                    <div class="value" th:text="${shop.avgRating() > 0} ? ${#numbers.formatDecimal(shop.avgRating(), 1, 1)} : 'New'">New</div>
                    <div class="label">Rating</div>
                </div>
                <div class="stat">
                    <div class="value" th:text="${shop.totalSales()}">0</div>
                    <div class="label">Total Sales</div>
                </div>
                <div class="stat">
                    <div class="value" th:text="${shop.tier()}">SILVER</div>
                    <div class="label">Tier</div>
                </div>
            </div>
        </div>
    </div>
    <div class="card">
        <h2>Shop Settings</h2>
        <form th:action="@{/seller/shop}" method="post" th:object="${shopForm}">
            <div class="form-group">
                <label for="shopName">Shop Name</label>
                <input id="shopName" type="text" th:field="*{shopName}" placeholder="Enter your shop name"/>
            </div>
            <div class="form-group">
                <label for="shopDescription">Shop Description</label>
                <textarea id="shopDescription" th:field="*{shopDescription}" placeholder="Tell buyers about your shop..."></textarea>
            </div>
            <div class="form-group">
                <label for="logoUrl">Logo URL</label>
                <input id="logoUrl" type="url" th:field="*{logoUrl}" placeholder="https://example.com/logo.png"/>
                <div class="hint">Recommended size: 200×200px</div>
            </div>
            <div class="form-group">
                <label for="bannerUrl">Banner URL</label>
                <input id="bannerUrl" type="url" th:field="*{bannerUrl}" placeholder="https://example.com/banner.jpg"/>
                <div class="hint">Recommended size: 1200×300px</div>
            </div>
            <button type="submit" class="btn">Save Shop Settings</button>
        </form>
    </div>
</div>
</body>
</html>
