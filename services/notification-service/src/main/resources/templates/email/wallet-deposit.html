<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Deposit Received</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h1 style="color: #333;">Deposit Received 💰</h1>
    <p>Hi <span th:text="${username}">User</span>,</p>
    <p>Your deposit of <strong>$<span th:text="${amount}">0.00</span></strong>
       <span th:if="${currency != null}">(<span th:text="${currency}">USD</span>)</span>
       has been received.</p>
    <p>Your wallet has been updated accordingly.</p>
    <hr style="border: 1px solid #eee;"/>
    <p style="color: #666; font-size: 12px;">This email was sent by Shop Platform.</p>
</body>
</html>
