spring:
  application:
    name: promotion-service
  mvc:
    problemdetails:
      enabled: true
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${PROMOTION_REDIS_HOST:redis}
      port: ${PROMOTION_REDIS_PORT:6379}
  datasource:
    url: ${PROMOTION_DB_URL:jdbc:mysql://mysql:3306/shop_promotion?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${PROMOTION_DB_USERNAME:shop}
    password: ${PROMOTION_DB_PASSWORD:shop}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    repair-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
server:
  port: 8080
  shutdown: graceful
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - x-user-id
        - x-order-id
      correlation-fields:
        - x-user-id
        - x-order-id
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://otel-collector:4318/v1/logs}
logging:
  structured:
    format:
      console: logstash
shop:
  profiling:
    enabled: ${PYROSCOPE_ENABLED:false}
    server-address: ${PYROSCOPE_SERVER_ADDRESS:http://pyroscope:4040}
  kafka:
    wallet-topic: ${WALLET_TOPIC:wallet.transactions.v1}
    buyer-registered-topic: ${BUYER_REGISTERED_TOPIC:buyer.registered.v1}
  idempotency:
    bloom-filter:
      enabled: ${PROMOTION_IDEMPOTENCY_BF_ENABLED:true}
      redis-key: ${PROMOTION_IDEMPOTENCY_BF_REDIS_KEY:shop:promotion:idempotency:bf}
      expected-insertions: ${PROMOTION_IDEMPOTENCY_BF_EXPECTED_INSERTIONS:10000000}
      false-probability: ${PROMOTION_IDEMPOTENCY_BF_FALSE_PROBABILITY:0.001}
      redis-timeout-ms: ${PROMOTION_IDEMPOTENCY_BF_REDIS_TIMEOUT_MS:100}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
    version: openapi_3_1
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
    persist-authorization: true
  paths-to-exclude:
    - /actuator/**
    - /internal/**
