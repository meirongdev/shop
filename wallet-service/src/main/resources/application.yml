spring:
  application:
    name: wallet-service
  mvc:
    problemdetails:
      enabled: true
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${WALLET_REDIS_HOST:redis}
      port: ${WALLET_REDIS_PORT:6379}
  datasource:
    url: ${WALLET_DB_URL:jdbc:mysql://mysql:3306/shop_wallet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${WALLET_DB_USERNAME:shop}
    password: ${WALLET_DB_PASSWORD:shop}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
server:
  port: 8080
  shutdown: graceful
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
logging:
  structured:
    format:
      console: logstash
shop:
  security:
    internal:
      enabled: true
      token: ${SHOP_INTERNAL_TOKEN:local-dev-internal-token-change-me}
      excluded-path-prefixes:
        - /actuator
        - /v3/api-docs
        - /swagger-ui
  wallet:
    stripe-enabled: ${STRIPE_ENABLED:false}
    stripe-secret-key: ${STRIPE_SECRET_KEY:}
    stripe-public-key: ${STRIPE_PUBLIC_KEY:}
    paypal-enabled: ${PAYPAL_ENABLED:false}
    paypal-client-id: ${PAYPAL_CLIENT_ID:}
    paypal-client-secret: ${PAYPAL_CLIENT_SECRET:}
    paypal-base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
    klarna-enabled: ${KLARNA_ENABLED:false}
    klarna-username: ${KLARNA_USERNAME:}
    klarna-password: ${KLARNA_PASSWORD:}
    klarna-base-url: ${KLARNA_BASE_URL:https://api.playground.klarna.com}
    default-currency: ${WALLET_DEFAULT_CURRENCY:usd}
    wallet-topic: ${WALLET_TOPIC:wallet.transactions.v1}
    outbox-publish-delay-ms: ${WALLET_OUTBOX_PUBLISH_DELAY_MS:5000}
  idempotency:
    bloom-filter:
      enabled: ${WALLET_IDEMPOTENCY_BF_ENABLED:true}
      redis-key: ${WALLET_IDEMPOTENCY_BF_REDIS_KEY:shop:wallet:idempotency:bf}
      expected-insertions: ${WALLET_IDEMPOTENCY_BF_EXPECTED_INSERTIONS:10000000}
      false-probability: ${WALLET_IDEMPOTENCY_BF_FALSE_PROBABILITY:0.001}
      redis-timeout-ms: ${WALLET_IDEMPOTENCY_BF_REDIS_TIMEOUT_MS:100}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
    persist-authorization: true
  paths-to-exclude:
    - /actuator/**
    - /internal/**
